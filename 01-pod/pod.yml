apiVersion: v1
kind: Pod
metadata:
  name: pod-html
  labels:
    app: pod-html
    environment: production
spec:
  containers:
    - name: pod-html
      image: prajwalda/html:1
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "64Mi"
          cpu: "200m"
        limits:
          memory: "100Mi"
          cpu: "512m"
    
